<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cosmic Void Staff Portal</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="header">
    <img src="https://cdn.discordapp.com/attachments/1433974277350096947/1488346333487169586/CV_easter_icon.png?ex=69ecbeca&is=69eb6d4a&hm=3a0bdce7c531f7f54b7b44e7687d2a168db9792b79a551182c638fc470d118bb&" class="logo" alt="Cosmic Void logo">
    <h1>Cosmic Void</h1>
    <p>Staff Portal</p>
  </div>

  <div class="menu">
    <a href="#" id="reviewsTab" data-page="reviews" class="active">Reviews</a>
    <a href="#" id="adminTab" data-page="admin" class="hidden">Admin</a>
  </div>

  <div class="container">
    <div id="statusMessage" class="status-message"></div>
    <div id="loadingSpinner" class="spinner"></div>

    <div id="reviewsPage" class="page">
      <div class="page-header">
        <h2>Monthly Ratings</h2>
      </div>
      <div id="reviewsToolbar" class="reviews-toolbar">
        <div id="profileEditor" class="profile-editor"></div>
        <div id="reviewFilterControls" class="review-filter-controls"></div>
      </div>
      <div id="reviewsBox"></div>
    </div>

    <div id="adminPage" class="page hidden">
      <div class="page-header">
        <h2>Admin Ratings Dashboard</h2>
      </div>
      <div class="admin-toolbar">
        <div style="display: flex; gap: 12px; align-items: center; flex-wrap: wrap;">
          <label for="adminMonthSelect">Month:</label>
          <select id="adminMonthSelect"></select>
        </div>
        <div id="adminControls" class="admin-controls"></div>
      </div>
      <div id="adminStats"></div>
      <div id="adminList" class="admin-list"></div>
    </div>

    <div id="revokedPage" class="page hidden">
      <div class="card">
        <h2>Access Revoked</h2>
        <p>Your access to the Staff Portal has been revoked.</p>
        <p>If your status has changed, please contact your administrator.</p>
      </div>
    </div>
  </div>

  <div id="popupOverlay" class="overlay hidden" aria-hidden="true">
    <div class="overlay-panel">
      <button id="popupClose" class="overlay-close" aria-label="Close popup">✕</button>
      <h2 id="popupTitle"></h2>
      <div id="popupBody"></div>
      <div id="popupActions" class="overlay-actions"></div>
    </div>
  </div>

  <script src="app-new.js"></script>
</body>
</html>
