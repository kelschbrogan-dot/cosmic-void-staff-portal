<!DOCTYPE html>
<html>
<head>
<link rel="stylesheet" href="style.css">
</head>
<body class="app">

<div class="nav">
  <a id="homeLink">Home</a>
  <a id="ratingsLink">Ratings</a>
  <a id="notesLink">Notes</a>
  <a id="adminLink">Admin</a>
</div>

<h1>Admin Panel</h1>

<select id="monthSelect"></select>

<div id="adminPanel"></div>

<script src="app.js"></script>

<script>
function buildMonthOptions() {
  const select = document.getElementById("monthSelect");
  const current = new Date();
  select.innerHTML = Array.from({ length: 12 }, (_, i) => {
    const date = new Date(current.getFullYear(), current.getMonth() - i, 1);
    return `<option value="${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, "0")}">${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, "0")}</option>`;
  }).join("");
}

document.addEventListener("DOMContentLoaded", () => {
  buildMonthOptions();
  document.getElementById("monthSelect").addEventListener("change", loadAdmin);
  loadAdmin();
});

async function loadAdmin() {
  const month = document.getElementById("monthSelect").value;

  const ratings = await post("getRatingsByMonth", { month });
  const notes = await post("getNotesByMonth", { month });

  const panel = document.getElementById("adminPanel");

  function ratingToNumber(value) {
    const normalized = String(value || "").trim().toLowerCase();
    if (!normalized) return null;
    const map = {
      excels: 5,
      "on par": 4,
      "meets standards": 3,
      "below par": 2,
      "needs work": 1
    };
    if (map[normalized] !== undefined) return map[normalized];
    const parsed = Number(normalized);
    return Number.isFinite(parsed) ? parsed : null;
  }

  const numericRatings = Array.isArray(ratings)
    ? ratings.map(r => ratingToNumber(r.rating)).filter(n => n !== null)
    : [];
  const averageRating = numericRatings.length
    ? (numericRatings.reduce((sum, value) => sum + value, 0) / numericRatings.length)
    : null;
  const averageText = averageRating ? `${averageRating.toFixed(1)} / 5` : "N/A";

  panel.innerHTML = `
    <h2>Ratings</h2>
    <p class="average-rating"><strong>General rating:</strong> ${averageText}</p>
    <pre>${JSON.stringify(ratings, null, 2)}</pre>

    <h2>Notes</h2>
    <pre>${JSON.stringify(notes, null, 2)}</pre>
  `;
}
</script>

</body>
</html>
